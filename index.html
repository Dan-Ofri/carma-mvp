<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carma | נהיגה בטוחה שווה כסף</title>
    <!-- Tailwind CSS & Lucide Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- React & Babel for browser execution -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700;800&display=swap');
        body { font-family: 'Assistant', sans-serif; }
        .animate-float { animation: float 6s ease-in-out infinite; }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
    </style>
</head>
<body class="bg-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Firebase Setup ---
        // הנתונים יילקחו מהגדרות הסביבה כפי שהוגדרו עבורך
        const firebaseConfig = JSON.parse(__firebase_config);
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'carma-mvp-production';

        const App = () => {
            const [formData, setFormData] = useState({ name: '', email: '', carOwner: 'yes' });
            const [submitted, setSubmitted] = useState(false);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');
            const [user, setUser] = useState(null);

            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await auth.signInWithCustomToken(__initial_auth_token);
                        } else {
                            await auth.signInAnonymously();
                        }
                    } catch (err) {
                        console.error("Auth error:", err);
                    }
                };
                initAuth();
                return auth.onAuthStateChanged(setUser);
            }, []);

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!user) return;
                setLoading(true);
                setError('');

                try {
                    // שמירה למסלול הציבורי לפי חוק 1
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('leads').add({
                        ...formData,
                        timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                        userAgent: navigator.userAgent
                    });
                    setSubmitted(true);
                } catch (err) {
                    setError('שגיאה בשמירת הנתונים. נסה שוב.');
                } finally {
                    setLoading(false);
                }
            };

            const scrollToForm = () => {
                document.getElementById('signup')?.scrollIntoView({ behavior: 'smooth' });
            };

            return (
                <div className="min-h-screen">
                    {/* Nav */}
                    <nav className="fixed top-0 w-full bg-white/80 backdrop-blur-md z-50 border-b border-slate-100 px-6 h-20 flex justify-between items-center">
                        <div className="flex items-center gap-2">
                            <div className="bg-blue-600 p-2 rounded-lg text-white">
                                <i data-lucide="car"></i>
                            </div>
                            <span className="text-2xl font-black tracking-tighter text-blue-600">CARMA</span>
                        </div>
                        <button onClick={scrollToForm} className="bg-slate-900 text-white px-6 py-2 rounded-full font-bold">הצטרפות</button>
                    </nav>

                    {/* Hero */}
                    <section className="pt-40 pb-20 px-6 text-center lg:text-right max-w-7xl mx-auto grid lg:grid-cols-2 gap-12 items-center">
                        <div>
                            <h1 className="text-5xl lg:text-7xl font-black text-slate-900 mb-6 leading-tight">
                                נהיגה בטוחה <br/><span className="text-blue-600">שווה כסף.</span>
                            </h1>
                            <p className="text-xl text-slate-500 mb-10 max-w-xl font-medium">
                                האפליקציה הראשונה בישראל שמתגמלת אתכם על נהיגה אחראית. צוברים נקודות וממירים לשוברי קנייה ב-Wolt, KSP ועוד.
                            </p>
                            <button onClick={scrollToForm} className="bg-blue-600 text-white px-10 py-5 rounded-2xl font-black text-xl shadow-xl shadow-blue-200 flex items-center gap-3 mx-auto lg:mx-0">
                                אני רוצה להצטרף
                                <i data-lucide="chevron-left"></i>
                            </button>
                        </div>
                        <div className="relative hidden lg:block animate-float">
                            <div className="w-[300px] h-[600px] bg-slate-900 rounded-[3rem] border-[8px] border-slate-800 shadow-2xl mx-auto overflow-hidden text-white p-8">
                                <div className="flex justify-between items-center mb-10">
                                    <div><p className="text-slate-400 text-xs">SCORE</p><p className="text-3xl font-bold">94</p></div>
                                    <div className="bg-green-500 text-[10px] px-2 py-1 rounded-full font-bold italic">SAFE DRIVER</div>
                                </div>
                                <div className="bg-blue-600 rounded-2xl p-4 mb-6">
                                    <p className="text-blue-100 text-xs">Available Credit</p>
                                    <p className="text-2xl font-bold">₪ 1,240</p>
                                </div>
                                <div className="space-y-4 opacity-40">
                                    <div className="h-12 bg-slate-800 rounded-xl"></div>
                                    <div className="h-12 bg-slate-800 rounded-xl"></div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Form Section */}
                    <section id="signup" className="py-24 bg-slate-50 px-6">
                        <div className="max-w-xl mx-auto">
                            {!submitted ? (
                                <div className="bg-white p-8 md:p-12 rounded-[3rem] shadow-xl border border-slate-200">
                                    <h2 className="text-3xl font-black text-center mb-4">הבטיחו מקום בבטא</h2>
                                    <p className="text-center text-slate-500 mb-8 font-medium">נשארו מקומות אחרונים לקבוצת הניסוי הראשונה.</p>
                                    <form onSubmit={handleSubmit} className="space-y-6">
                                        <div>
                                            <label className="block text-sm font-bold text-slate-700 mb-2">שם מלא</label>
                                            <input type="text" required className="w-full px-5 py-4 rounded-xl border border-slate-200 outline-none focus:border-blue-500 font-bold" 
                                                value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-bold text-slate-700 mb-2">אימייל</label>
                                            <input type="email" required className="w-full px-5 py-4 rounded-xl border border-slate-200 outline-none focus:border-blue-500 text-left font-bold" 
                                                value={formData.email} onChange={e => setFormData({...formData, email: e.target.value})} />
                                        </div>
                                        <button type="submit" disabled={loading} className="w-full bg-blue-600 text-white py-5 rounded-2xl font-black text-xl flex justify-center items-center gap-3">
                                            {loading ? "שולח..." : "שריינו לי מקום!"}
                                        </button>
                                        {error && <p className="text-red-500 text-center font-bold text-sm">{error}</p>}
                                    </form>
                                </div>
                            ) : (
                                <div className="bg-white p-12 rounded-[3rem] shadow-xl text-center border-2 border-green-100 animate-in fade-in zoom-in">
                                    <div className="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6">
                                        <i data-lucide="check-circle-2" className="w-10 h-10"></i>
                                    </div>
                                    <h2 className="text-3xl font-black mb-4">רשמנו אותך!</h2>
                                    <p className="text-slate-500 font-medium">הפרטים נשמרו במערכת הניסוי. ניצור קשר במייל ברגע שנשיק את הבטא.</p>
                                </div>
                            )}
                        </div>
                    </section>

                    <footer className="py-12 text-center text-slate-400 text-sm font-bold">
                        <p>© 2026 Carma MVP | ניסוי אקדמי למטרות מחקר</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // Initialize icons
        setTimeout(() => {
            if (window.lucide) window.lucide.createIcons();
        }, 500);
    </script>
</body>
</html>
